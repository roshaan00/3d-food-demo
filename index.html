<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive 3D Bowl</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#0f0f0f;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth / window.innerHeight,
    0.1,
    100
);

camera.position.z = 4;

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.shadowMap.enabled = true;

document.body.appendChild(
    renderer.domElement
);

const loader = new THREE.TextureLoader();

Promise.all([
    loader.loadAsync("bowl.jpg"),
    loader.loadAsync("bowl.jpg")
]).then(([colorMap, displacementMap])=>{

    colorMap.anisotropy = 16;

    const geometry =
        new THREE.PlaneGeometry(
            3,
            3,
            256,
            256
        );

    const material =
        new THREE.MeshStandardMaterial({
            map: colorMap,
            displacementMap: displacementMap,
            displacementScale: 0.25,
            roughness: 0.7,
            metalness: 0.05
        });

    const bowl =
        new THREE.Mesh(
            geometry,
            material
        );

    bowl.castShadow = true;
    bowl.receiveShadow = true;

    scene.add(bowl);

    animate(bowl);
});

const ambient =
    new THREE.AmbientLight(
        0xffffff,
        1.5
    );

scene.add(ambient);

const keyLight =
    new THREE.DirectionalLight(
        0xffffff,
        2
    );

keyLight.position.set(
    4,
    5,
    5
);

scene.add(keyLight);

const rimLight =
    new THREE.DirectionalLight(
        0xffffff,
        1
    );

rimLight.position.set(
    -4,
    2,
    -3
);

scene.add(rimLight);

let mouseX = 0;
let mouseY = 0;

window.addEventListener(
    "mousemove",
    (e)=>{

        mouseX =
            (e.clientX /
            window.innerWidth) * 2 - 1;

        mouseY =
            -(e.clientY /
            window.innerHeight) * 2 + 1;
    }
);

function animate(mesh){

    function render(){

        requestAnimationFrame(render);

        mesh.rotation.y += (
            mouseX * 0.45 -
            mesh.rotation.y
        ) * 0.08;

        mesh.rotation.x += (
            mouseY * 0.25 -
            mesh.rotation.x
        ) * 0.08;

        mesh.position.x += (
            mouseX * 0.15 -
            mesh.position.x
        ) * 0.08;

        mesh.position.y += (
            mouseY * 0.15 -
            mesh.position.y
        ) * 0.08;

        renderer.render(
            scene,
            camera
        );
    }

    render();
}

window.addEventListener(
    "resize",
    ()=>{

        camera.aspect =
            window.innerWidth /
            window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );
    }
);

</script>

</body>
</html>
